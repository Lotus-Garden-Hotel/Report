<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banquet Report — Lotus Garden by WH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<style>
:root {
  --black:   #0a0a0c;
  --dark:    #111114;
  --surface: #17171b;
  --card:    #1e1e24;
  --border:  rgba(255,255,255,.07);
  --border2: rgba(255,255,255,.12);
  --text:    #e8e4dc;
  --muted:   #8a8580;
  --dim:     #555050;
  --gold:    #c9a84c;
  --gold2:   #e8c96a;
  --gold3:   #f0dfa0;
  --red:     #e74c3c;
  --green:   #2ecc71;
  --blue:    #5dade2;
  --amber:   #f39c12;
  --purple:  #9b59b6;
  --confirm:   #6366f1;
  --tentative: #f59e0b;
  --done:      #10b981;
  --cancel:    #ef4444;
}

/* ── LIGHT MODE ── */
body.light-mode {
  --black:   #f5f4f0;
  --dark:    #eceae4;
  --surface: #f9f8f5;
  --card:    #ffffff;
  --border:  rgba(0,0,0,.1);
  --border2: rgba(0,0,0,.18);
  --text:    #1a1814;
  --muted:   #5a5650;
  --dim:     #9a9890;
  --gold:    #a07830;
  --gold2:   #c89840;
  --gold3:   #8a6020;
  --confirm:   #4f46e5;
  --tentative: #d97706;
  --done:      #059669;
  --cancel:    #dc2626;
}
body.light-mode .topbar {
  background:rgba(245,244,240,.95);
  border-bottom-color:rgba(0,0,0,.1);
}
body.light-mode .kpi-card,
body.light-mode .chart-card,
body.light-mode .onhand-card,
body.light-mode .budget-editor,
body.light-mode .lb-row,
body.light-mode .budget-row {
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
body.light-mode .detail-tbl thead tr { background:#f0ede6; }
body.light-mode .detail-tbl td { border-bottom-color:rgba(0,0,0,.06); }
body.light-mode .detail-tbl tbody tr:hover { background:rgba(0,0,0,.02); }
body.light-mode .badge.CONFIRM   { background:rgba(99,102,241,.12); }
body.light-mode .badge.TENTATIVE { background:rgba(217,119,6,.12); }
body.light-mode .badge.DONE      { background:rgba(5,150,105,.12); }
body.light-mode .badge.CANCEL    { background:rgba(220,38,38,.12); }
body.light-mode #login-gate {
  background:radial-gradient(ellipse at 60% 20%, rgba(160,120,48,.12) 0%, var(--black) 70%);
}
body.light-mode .occ-pct.hi  { background:rgba(5,150,105,.15); }
body.light-mode .occ-pct.mid { background:rgba(217,119,6,.15); }
body.light-mode .occ-pct.lo  { background:rgba(0,0,0,.06); }
body.light-mode .hm-cell { background:rgba(0,0,0,.04); border-color:rgba(0,0,0,.06); }
body.light-mode .hm-cell.lv1 { background:rgba(160,120,48,.12); }
body.light-mode .hm-cell.lv2 { background:rgba(160,120,48,.28); }
body.light-mode .hm-cell.lv3 { background:rgba(160,120,48,.50); }
body.light-mode .hm-cell.lv4 { background:rgba(160,120,48,.72); }
body.light-mode .hm-cell.lv5 { background:rgba(160,120,48,.92); color:#fff; }
/* Theme toggle button */
.btn-theme {
  background:var(--card); border:1px solid var(--border2);
  color:var(--muted); border-radius:8px; padding:6px 12px;
  font-size:13px; cursor:pointer; transition:all .2s; flex-shrink:0;
}
.btn-theme:hover { border-color:var(--gold); color:var(--gold); }
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'DM Sans',sans-serif;
  background:var(--black); color:var(--text);
  min-height:100vh; font-size:13px;
}

/* ── LOGIN GATE ── */
#login-gate {
  position:fixed; inset:0; z-index:900;
  background:radial-gradient(ellipse at 60% 20%, rgba(201,168,76,.08) 0%, var(--black) 70%);
  display:flex; align-items:center; justify-content:center; padding:24px;
}
#login-gate.hide { display:none; }
.login-card {
  background:var(--card); border:1px solid rgba(201,168,76,.2);
  border-radius:20px; padding:36px 32px; max-width:360px; width:100%; text-align:center;
}
.login-logo {
  font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px;
}
.login-sub { font-size:10px; color:var(--muted); letter-spacing:.2em; text-transform:uppercase; margin-bottom:28px; }
.login-btn {
  width:100%; padding:14px; border-radius:12px; font-size:13px; font-weight:700;
  background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.1));
  border:1px solid rgba(201,168,76,.4); color:var(--gold); cursor:pointer;
  letter-spacing:.05em; transition:all .2s;
}
.login-btn:hover { background:rgba(201,168,76,.25); }
.login-err { margin-top:14px; font-size:11px; color:var(--red); min-height:16px; }

/* ── APP SHELL ── */
#app { display:none; min-height:100vh; }
#app.show { display:block; }

/* ── TOPBAR ── */
.topbar {
  position:sticky; top:0; z-index:100;
  background:rgba(10,10,12,.92); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 20px; height:54px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.topbar-brand {
  font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:700;
  color:var(--gold); white-space:nowrap; letter-spacing:.05em;
}
.topbar-brand span { font-size:10px; color:var(--muted); font-family:'DM Sans',sans-serif; margin-left:8px; letter-spacing:.1em; text-transform:uppercase; }
.topbar-controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.ctrl-select {
  background:var(--card); border:1px solid var(--border2); color:var(--text);
  border-radius:8px; padding:6px 10px; font-size:11px; font-family:'DM Sans',sans-serif;
  cursor:pointer; outline:none;
}
.ctrl-select:focus { border-color:var(--gold); }
.ctrl-btn {
  background:var(--card); border:1px solid var(--border2); color:var(--muted);
  border-radius:8px; padding:6px 12px; font-size:11px; font-weight:600;
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.ctrl-btn:hover { border-color:var(--gold); color:var(--gold); }
.ctrl-btn.primary { background:rgba(201,168,76,.1); border-color:rgba(201,168,76,.3); color:var(--gold); }
.ctrl-btn.onhand-off { background:var(--card); border:1.5px solid var(--border2); color:var(--muted); font-weight:700; }
.ctrl-btn.onhand-on  { background:rgba(245,158,11,.18); border:1.5px solid #f59e0b; color:#fbbf24; font-weight:700; box-shadow:0 0 8px rgba(245,158,11,.25); animation:onhandPulse 2s ease-in-out infinite; }
@keyframes onhandPulse { 0%,100%{box-shadow:0 0 6px rgba(245,158,11,.2)} 50%{box-shadow:0 0 14px rgba(245,158,11,.5)} }
.topbar-user { font-size:10px; color:var(--dim); white-space:nowrap; }

/* ── MAIN CONTENT ── */
.main { padding:20px; max-width:1400px; margin:0 auto; }

/* ── LOADING ── */
.loading-overlay {
  position:fixed; inset:0; background:rgba(10,10,12,.85); z-index:200;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px;
}
.loading-overlay.hide { display:none; }
.spin { width:32px; height:32px; border:3px solid rgba(201,168,76,.2); border-top-color:var(--gold); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-txt { font-size:11px; color:var(--muted); letter-spacing:.1em; }

/* ── SECTION HEADER ── */
.section-hdr {
  display:flex; align-items:baseline; gap:10px; margin-bottom:14px; margin-top:28px;
}
.section-hdr:first-child { margin-top:0; }
.section-title {
  font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700; color:var(--gold);
}
.section-sub { font-size:10px; color:var(--dim); letter-spacing:.15em; text-transform:uppercase; }

/* ── KPI CARDS ── */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:8px; }
.kpi-card {
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:16px 14px; position:relative; overflow:hidden;
}
.kpi-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
}
.kpi-card.gold::before  { background:linear-gradient(90deg,var(--gold),var(--gold2)); }
.kpi-card.green::before { background:linear-gradient(90deg,var(--green),#82e0aa); }
.kpi-card.blue::before  { background:linear-gradient(90deg,var(--blue),#85c1e9); }
.kpi-card.amber::before { background:linear-gradient(90deg,var(--amber),#f8c471); }
.kpi-card.purple::before{ background:linear-gradient(90deg,var(--purple),#c39bd3); }
.kpi-card.red::before   { background:linear-gradient(90deg,var(--red),#f1948a); }
.kpi-lbl { font-size:9px; color:var(--dim); letter-spacing:.12em; text-transform:uppercase; margin-bottom:8px; }
.kpi-val { font-size:22px; font-weight:700; color:var(--text); line-height:1; }
.kpi-val.sm { font-size:17px; }
.kpi-sub { font-size:9px; color:var(--muted); margin-top:5px; }
.kpi-delta { font-size:10px; font-weight:600; margin-top:4px; }
.kpi-delta.up   { color:var(--green); }
.kpi-delta.down { color:var(--red); }

/* ── CHART CONTAINERS ── */
.chart-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
@media(max-width:700px) { .chart-row { grid-template-columns:1fr; } }
.chart-card {
  background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px;
}
.chart-card.full { grid-column:1/-1; }
.chart-title { font-size:11px; font-weight:700; color:var(--text); letter-spacing:.05em; margin-bottom:14px; }
.chart-sub { font-size:9px; color:var(--dim); margin-top:2px; }

/* ── BAR CHART ── */
.bar-chart { display:flex; align-items:flex-end; gap:4px; height:120px; }
.bar-group { display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; }
.bar-wrap { display:flex; gap:2px; align-items:flex-end; height:100px; width:100%; justify-content:center; }
.bar {
  border-radius:3px 3px 0 0; min-width:8px; transition:opacity .2s;
  position:relative; cursor:pointer;
}
.bar:hover { opacity:.8; }
.bar-lbl { font-size:7px; color:var(--dim); text-align:center; white-space:nowrap; }
.bar-val { position:absolute; top:-14px; left:50%; transform:translateX(-50%); font-size:7px; color:var(--muted); white-space:nowrap; }

/* ── PROGRESS BAR ── */
.progress-section { display:flex; flex-direction:column; gap:10px; }
.progress-item {}
.progress-hdr { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
.progress-name { font-size:11px; font-weight:600; color:var(--text); }
.progress-vals { font-size:10px; color:var(--muted); }
.progress-track { height:8px; background:rgba(255,255,255,.06); border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; transition:width .6s cubic-bezier(.4,0,.2,1); }
.progress-pct { font-size:9px; color:var(--dim); margin-top:3px; text-align:right; }

/* ── DONUT CHART ── */
.donut-wrap { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
.donut-svg { flex-shrink:0; }
.donut-legend { flex:1; min-width:100px; display:flex; flex-direction:column; gap:6px; }
.legend-item { display:flex; align-items:center; gap:6px; }
.legend-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.legend-name { font-size:10px; color:var(--muted); flex:1; }
.legend-val { font-size:10px; font-weight:700; color:var(--text); }
.legend-pct { font-size:9px; color:var(--dim); }

/* ── STATUS BADGES ── */
.badge {
  display:inline-block; padding:2px 8px; border-radius:4px;
  font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
}
.badge.CONFIRM   { background:rgba(99,102,241,.15); color:#818cf8; border:1px solid rgba(99,102,241,.2); }
.badge.TENTATIVE { background:rgba(245,158,11,.15); color:#fbbf24; border:1px solid rgba(245,158,11,.2); }
.badge.DONE      { background:rgba(16,185,129,.12); color:#34d399; border:1px solid rgba(16,185,129,.2); }
.badge.CANCEL    { background:rgba(239,68,68,.12);  color:#f87171; border:1px solid rgba(239,68,68,.2); }

/* ── LEADERBOARD ── */
.leaderboard { display:flex; flex-direction:column; gap:8px; }
.lb-row {
  display:flex; align-items:center; gap:10px;
  background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 12px;
}
.lb-rank { font-size:14px; font-weight:800; color:var(--dim); width:20px; text-align:center; }
.lb-rank.r1 { color:var(--gold); }
.lb-rank.r2 { color:var(--muted); }
.lb-rank.r3 { color:#cd7f32; }
.lb-name { font-size:12px; font-weight:700; flex:1; }
.lb-stats { display:flex; gap:14px; }
.lb-stat { text-align:right; }
.lb-stat-val { font-size:12px; font-weight:700; color:var(--text); }
.lb-stat-lbl { font-size:8px; color:var(--dim); letter-spacing:.08em; text-transform:uppercase; }
.lb-bar-wrap { width:80px; }
.lb-bar-track { height:4px; background:rgba(255,255,255,.06); border-radius:2px; overflow:hidden; }
.lb-bar-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--gold),var(--gold2)); }
/* ── LEADERBOARD BUDGET ROW ── */
.lb-row-budget {
  display:block; padding:14px 16px;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
}
.lb-achieve-grid {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px;
}
.lb-mini-card {
  background:rgba(255,255,255,.04); border:1px solid var(--border);
  border-radius:8px; padding:8px 10px;
}
.lb-mini-lbl { font-size:8px; color:var(--dim); letter-spacing:.1em; text-transform:uppercase; margin-bottom:3px; }
.lb-mini-val { font-size:13px; font-weight:800; font-family:'DM Mono',monospace; line-height:1.2; }

/* ── DETAIL TABLE ── */
.tbl-controls { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; align-items:center; }
.tbl-search {
  flex:1; min-width:140px; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:7px 10px; color:var(--text); font-size:11px;
  font-family:'DM Sans',sans-serif; outline:none;
}
.tbl-search:focus { border-color:var(--gold); }
.tbl-filter {
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  border-radius:8px; padding:7px 10px; font-size:11px; cursor:pointer; outline:none;
  font-family:'DM Sans',sans-serif;
}
.tbl-filter:focus { border-color:var(--gold); }
.tbl-wrap { overflow-x:auto; border-radius:12px; border:1px solid var(--border); }
table.detail-tbl { width:100%; border-collapse:collapse; font-size:11px; }
.detail-tbl thead tr { background:var(--surface); }
.detail-tbl th {
  padding:10px 12px; text-align:left; font-size:9px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase; color:var(--dim);
  border-bottom:1px solid var(--border); white-space:nowrap;
}
.detail-tbl td {
  padding:9px 12px; border-bottom:1px solid rgba(255,255,255,.03);
  color:var(--text); white-space:nowrap;
}
.detail-tbl tbody tr:hover { background:rgba(255,255,255,.02); }
.detail-tbl tbody tr:last-child td { border-bottom:none; }
.tbl-revenue { font-weight:700; color:var(--gold); font-family:'DM Mono',monospace; }
.tbl-pax { color:var(--muted); }
.tbl-empty { text-align:center; padding:30px; color:var(--dim); font-size:12px; }
.tbl-count { font-size:10px; color:var(--dim); }

/* ── ONHAND SECTION ── */
.onhand-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px; }
.onhand-card {
  background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px;
}
.onhand-label { font-size:9px; color:var(--dim); letter-spacing:.12em; text-transform:uppercase; margin-bottom:8px; }
.onhand-val { font-size:20px; font-weight:700; }
.onhand-val.gold { color:var(--gold); }
.onhand-val.green { color:var(--green); }
.onhand-val.amber { color:var(--amber); }
.onhand-budget { font-size:10px; color:var(--muted); margin-top:4px; }
.onhand-pct-big { font-size:28px; font-weight:800; }

/* ── BUDGET EDITOR ── */
.budget-editor { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; }
.budget-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; margin-top:12px; }
.budget-row { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
.budget-month { font-size:10px; font-weight:700; color:var(--gold); margin-bottom:6px; letter-spacing:.08em; }
.budget-inp-wrap { display:flex; flex-direction:column; gap:4px; }
.budget-inp-lbl { font-size:8px; color:var(--dim); letter-spacing:.1em; text-transform:uppercase; }
.budget-inp {
  background:var(--card); border:1px solid var(--border); color:var(--text);
  border-radius:6px; padding:6px 8px; font-size:11px; outline:none; width:100%;
  font-family:'DM Sans',sans-serif;
}
.budget-inp:focus { border-color:var(--gold); }
.budget-save-btn {
  margin-top:12px; padding:10px 20px; border-radius:10px; font-size:11px; font-weight:700;
  background:rgba(201,168,76,.15); border:1px solid rgba(201,168,76,.3); color:var(--gold);
  cursor:pointer; transition:all .2s;
}
.budget-save-btn:hover { background:rgba(201,168,76,.25); }
.budget-status { font-size:10px; color:var(--green); margin-top:8px; min-height:16px; }

/* ── ACTUAL VS BUDGET GAP CARDS ── */
.actvbud-grid {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;
  margin-bottom:16px; margin-top:4px;
}
@media(max-width:900px) { .actvbud-grid { grid-template-columns:1fr; } }
@media(max-width:600px) { .actvbud-grid { grid-template-columns:1fr; } }

.actvbud-card {
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:18px 18px 14px; position:relative; overflow:hidden;
  transition:transform .2s, box-shadow .2s;
}
.actvbud-card:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,.25); }
.actvbud-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
}
.actvbud-card.gold::before  { background:linear-gradient(90deg,var(--gold),var(--gold2)); }
.actvbud-card.green::before { background:linear-gradient(90deg,var(--green),#82e0aa); }
.actvbud-card.red::before   { background:linear-gradient(90deg,var(--red),#f1948a); }
.actvbud-card.amber::before { background:linear-gradient(90deg,var(--amber),#f8c471); }

.actvbud-lbl {
  font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--dim); margin-bottom:10px;
}
.actvbud-pct {
  font-size:36px; font-weight:800; line-height:1.1; margin-bottom:6px;
  font-family:'DM Mono',monospace;
}
.actvbud-pct.gold  { color:var(--gold); }
.actvbud-pct.green { color:var(--green); }
.actvbud-pct.red   { color:var(--red); }
.actvbud-pct.amber { color:var(--amber); }

.actvbud-row {
  display:flex; justify-content:space-between; align-items:center;
  font-size:11px; color:var(--muted); margin-top:4px; line-height:1.6;
}
.actvbud-row strong { color:var(--text); font-weight:600; }
.actvbud-badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700;
  margin-top:10px;
}
.actvbud-badge.green { background:rgba(46,204,113,.12); color:var(--green); }
.actvbud-badge.red   { background:rgba(231,76,60,.12);  color:var(--red); }

<body>

<script>
// ══════════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCX0--DGM_tp_2y7hBbrGiMfeVyToVD4zM",
  authDomain:        "banquet-dashboard-kediri.firebaseapp.com",
  projectId:         "banquet-dashboard-kediri",
  storageBucket:     "banquet-dashboard-kediri.firebasestorage.app",
  messagingSenderId: "716626784276",
  appId:             "1:716626784276:web:4f7d4d51dace341d21b701"
};
// GAS URL — pakai URL yang sama dengan Code.gs V6.3
// Tidak perlu deploy terpisah
const DEFAULT_REPORT_GAS = 'https://script.google.com/macros/s/AKfycbx-yE5bs_ZgNeDvEKnXzUmqjV9ScUjQ0vgShnPGLDkSpOqUQlab9RI5nI8mRoeTZ9N0/exec';
const GAS_URL = (function() {
  try {
    const cfg = JSON.parse(localStorage.getItem('banquet_master_cfg_v4') ||
                           localStorage.getItem('banquet_elite_config') || '{}');
    return cfg.gasUrl_entry || cfg.gasUrl || DEFAULT_REPORT_GAS;
  } catch(_) { return DEFAULT_REPORT_GAS; }
})();

const MONTHS = ["JANUARI","FEBRUARI","MARET","APRIL","MEI","JUNI",
                "JULI","AGUSTUS","SEPTEMBER","OKTOBER","NOVEMBER","DESEMBER"];
const MONTH_SHORT = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agt","Sep","Okt","Nov","Des"];

// ── Budget split per sales — ubah di sini untuk adjustment ke depan ──
// Key = nama sales UPPERCASE, value = porsi dari total budget bulanan (0–1)
const SALES_BUDGET_SPLIT = {
  'DWI':  0.60,
  'TINA': 0.40,
};

// ── State ──
let _idToken   = '';
let _reportData = null;   // { JANUARI:{events,revenue,pax,count,...}, ... }
let _budgetData = null;   // [{ bulan, targetRevenue, targetEvents, targetPax }, ...]
let _selMonth  = 'ALL';
let _revenueMode = 'nett'; // 'nett' atau 'gross'
let _onhandMode  = false;  // true = tampilkan hanya CONFIRM & TENTATIVE
const VAT = 1.21; // PPN 11% → sebenarnya 1.11, tapi pakai 1.21 sesuai request

function getRevenue(grossValue) {
  // grossValue = pax * price dari spreadsheet (diasumsikan GROSS)
  return _revenueMode === 'nett' ? grossValue / VAT : grossValue;
}
function getBudgetDisplay(targetRevenue) {
  // budget di sheet = NETT, jika mode gross kalikan 1.21
  return _revenueMode === 'gross' ? targetRevenue * VAT : targetRevenue;
}

// ══════════════════════════════════════════════════════════════════
// FIREBASE AUTH
// ══════════════════════════════════════════════════════════════════
firebase.initializeApp(FIREBASE_CONFIG);
const _auth     = firebase.auth();
const _provider = new firebase.auth.GoogleAuthProvider();

// [FIX-B2] Set persistence LOCAL secara eksplisit agar session survive hard refresh
_auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});

// [FIX-B2] Sembunyikan login gate selama Firebase restore session (~300-800ms)
// Hindari flicker "minta login" padahal session masih valid
const _gate = document.getElementById('login-gate');
_gate.classList.add('hide'); // sembunyikan dulu
let _sessionRestoreTimeout = setTimeout(() => {
  // Jika 3 detik belum ada user → tampilkan login gate
  if (!_authVerified) _gate.classList.remove('hide');
}, 3000);

// Race condition guard — sama dengan entry_live_secure.html
let _authVerified = false;
let _authInFlight = false;

_auth.onAuthStateChanged(async user => {
  const gate   = document.getElementById('login-gate');
  const errEl  = document.getElementById('login-err');

  if (!user) {
    clearTimeout(_sessionRestoreTimeout);
    if (!_authVerified) {
      gate.classList.remove('hide');
      document.getElementById('app').classList.remove('show');
    }
    return;
  }

  if (_authVerified) return;
  if (_authInFlight) return;
  _authInFlight = true;

  try {
    const idToken = await user.getIdToken(true);
    _idToken = idToken;

    // Validasi ke GAS
    let res = null;
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 10000); // 10s timeout
      const url  = GAS_URL + '?' + new URLSearchParams({ action:'CHECK_ACCESS', idToken, from:'report' });
      const resp = await fetch(url, { redirect:'follow', signal: ctrl.signal });
      clearTimeout(timer);
      res = await resp.json();
    } catch(netErr) {
      // Timeout / offline — tetap izinkan jika Firebase auth berhasil
      console.warn('[Report] CHECK_ACCESS failed:', netErr.message);
      res = null;
    }

    // Jika GAS menolak karena email tidak terdaftar — blokir
    if (res && !res.ok && res.msg && res.msg.includes('tidak terdaftar')) {
      _auth.signOut();
      errEl.textContent = '⚠ Akun tidak diizinkan akses sistem ini.';
      _authVerified = false;
      _authInFlight = false;
      return;
    }

    // Jika GAS OK dan role STAFF — blokir
    if (res && res.ok && res.allowed && res.role === 'STAFF') {
      _auth.signOut();
      errEl.textContent = '⚠ Akses ditolak. Report hanya untuk Manager & Admin.';
      _authVerified = false;
      _authInFlight = false;
      return;
    }

    // Semua kondisi lain (GAS OK, GAS timeout, error lain) — izinkan masuk
    _authVerified = true;
    window._userRole = (res && res.role) ? res.role : 'MANAGER';
    gate.classList.add('hide');
    document.getElementById('app').classList.add('show');
    document.getElementById('topbar-user').textContent = user.email || '';
    errEl.textContent = '';
    applyStoredTheme();
    await loadAll();
  } catch(e) {
    if (_auth.currentUser) {
      _authVerified = true;
      gate.classList.add('hide');
      document.getElementById('app').classList.add('show');
      await loadAll();
    } else {
      errEl.textContent = '⚠ Gagal verifikasi sesi. Coba refresh halaman.';
    }
  } finally {
    _authInFlight = false;
  }
});

function doLogin() {
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  errEl.style.color = '#e74c3c';
  _auth.signInWithPopup(_provider).catch(e => {
    console.error('[Login Error]', e.code, e.message);
    const msg =
      e.code === 'auth/popup-blocked'
        ? '⚠ Popup diblokir. Izinkan popup di browser lalu coba lagi.'
      : e.code === 'auth/popup-closed-by-user'
        ? ''
      : e.code === 'auth/unauthorized-domain'
        ? '⚠ Domain belum diizinkan. Tambahkan domain ini di Firebase Console → Authentication → Settings → Authorized domains.'
      : e.code === 'auth/operation-not-allowed'
        ? '⚠ Google Sign-In belum diaktifkan di Firebase Console.'
      : e.code === 'auth/network-request-failed'
        ? '⚠ Gagal koneksi. Periksa internet lalu coba lagi.'
      : e.code === 'auth/cancelled-popup-request'
        ? ''
      : '⚠ [' + (e.code||'error') + '] ' + (e.message || 'Login gagal.');
    document.getElementById('login-err').textContent = msg;
  });
}
function logoutUser() {
  _authVerified = false;
  _auth.signOut();
}

// ══════════════════════════════════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════════════════════════════════
function showLoading(txt) {
  const el = document.getElementById('loading');
  el.classList.remove('hide');
  document.getElementById('loading-txt').textContent = txt || 'Memuat...';
}
function hideLoading() { document.getElementById('loading').classList.add('hide'); }

async function gas(params) {
  const url = GAS_URL + '?' + new URLSearchParams({ ...params, idToken: _idToken });
  const res = await fetch(url, { redirect:'follow' });
  return res.json();
}

async function loadAll() {
  showLoading('Memuat report data...');
  try {
    _idToken = await _auth.currentUser.getIdToken(true);
    const [repRes, budRes] = await Promise.all([
      gas({ action:'READ_REPORT' }),
      gas({ action:'READ_BUDGET' })
    ]);
    if (!repRes.ok) { alert('Error: ' + repRes.msg); hideLoading(); return; }
    _reportData = repRes.report;
    _budgetData = budRes.ok ? budRes.budget : [];
    _selMonth = document.getElementById('sel-month').value;
    renderAll();
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div style="text-align:center;padding:60px;color:var(--red);">✗ ${e.message}</div>`;
  } finally { hideLoading(); }
}

function onFilterChange() {
  _selMonth = document.getElementById('sel-month').value;
  if (_reportData) renderAll();
}

// ── ONHAND TOGGLE ────────────────────────────────────────────────
function toggleOnhand() {
  _onhandMode = !_onhandMode;
  const btn = document.getElementById('btn-onhand');
  if (btn) {
    btn.className = 'ctrl-btn ' + (_onhandMode ? 'onhand-on' : 'onhand-off');
    btn.textContent = _onhandMode ? '⏳ ONHAND ✓' : '⏳ ONHAND';
  }
  // Saat ONHAND aktif, reset tbl-status-filter agar tidak bentrok
  const stFil = document.getElementById('tbl-status-filter');
  if (stFil && _onhandMode) stFil.value = '';
  if (_reportData) renderAll();
}

// ══════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════
function fmtRp(n) {
  if (!n || n < 1000) return 'Rp ' + Math.round(n||0).toLocaleString('id-ID');
  if (n >= 1e9)  return 'Rp ' + (n/1e9).toFixed(1).replace('.',',') + ' M';
  if (n >= 1e6)  return 'Rp ' + (n/1e6).toFixed(1).replace('.',',') + ' jt';
  if (n >= 1e3)  return 'Rp ' + (n/1e3).toFixed(0) + ' rb';
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}
function fmtRpFull(n) {
  return 'Rp ' + Math.round(n||0).toLocaleString('id-ID');
}
function pct(a, b) { return b > 0 ? Math.round(a / b * 100) : 0; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getFilteredEvents() {
  if (!_reportData) return [];
  let evts;
  if (_selMonth === 'ALL') {
    evts = MONTHS.flatMap(m => (_reportData[m]?.events || []).map(e => ({...e, bulan:m})));
  } else {
    evts = (_reportData[_selMonth]?.events || []).map(e => ({...e, bulan:_selMonth}));
  }
  // ONHAND mode: hanya CONFIRM & TENTATIVE
  if (_onhandMode) evts = evts.filter(e => e.status === 'CONFIRM' || e.status === 'TENTATIVE');
  return evts;
}

function getBudgetFor(month) {
  if (!_budgetData) return { targetRevenue:0, targetEvents:0, targetPax:0 };
  return _budgetData.find(b => b.bulan === month) || { targetRevenue:0, targetEvents:0, targetPax:0 };
}

// ── SECTION 1: KPI ──────────────────────────────────────────────
function renderKPI() {
  const events = getFilteredEvents();
  const activeEvents = events.filter(e => e.status !== 'CANCEL');
  const revenue  = activeEvents.reduce((s,e) => s + getRevenue(e.revenue), 0);
  const pax      = activeEvents.reduce((s,e) => s + e.pax, 0);
  const count    = activeEvents.length;
  const avgPax   = count > 0 ? Math.round(pax/count) : 0;
  const avgRev   = count > 0 ? revenue/count : 0;
  const confirm  = events.filter(e=>e.status==='CONFIRM').length;
  const tentative= events.filter(e=>e.status==='TENTATIVE').length;
  const done     = events.filter(e=>e.status==='DONE').length;
  const cancel   = events.filter(e=>e.status==='CANCEL').length;

  // Budget comparison
  let budgetRev = 0, budgetEvt = 0;
  if (_selMonth === 'ALL') {
    MONTHS.forEach(m => { const b = getBudgetFor(m); budgetRev += getBudgetDisplay(b.targetRevenue); budgetEvt += b.targetEvents; });
  } else {
    const b = getBudgetFor(_selMonth); budgetRev = getBudgetDisplay(b.targetRevenue); budgetEvt = b.targetEvents;
  }
  const revPct = pct(revenue, budgetRev);
  const evtPct = pct(count, budgetEvt);

  const sec = document.createElement('div');
  sec.innerHTML = `
    <div class="section-hdr">
      <div class="section-title">◆ KPI Summary</div>
      <div class="section-sub">${_selMonth === 'ALL' ? 'Semua Bulan 2026' : _selMonth + ' 2026'}</div>
    </div>
    <div class="kpi-grid fade-up">
      <div class="kpi-card gold">
        <div class="kpi-lbl">Total Revenue</div>
        <div class="kpi-val sm">${fmtRp(revenue)}</div>
        ${budgetRev > 0 ? `<div class="kpi-delta ${revPct>=100?'up':'down'}">${revPct}% dari target</div>` : ''}
        <div class="kpi-sub">${fmtRpFull(revenue)}</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-lbl">Total Events</div>
        <div class="kpi-val">${count}</div>
        ${budgetEvt > 0 ? `<div class="kpi-delta ${evtPct>=100?'up':'down'}">${evtPct}% dari target</div>` : ''}
        <div class="kpi-sub">${confirm} Confirm · ${tentative} Tentative · ${done} Done</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-lbl">Total Pax</div>
        <div class="kpi-val">${pax.toLocaleString('id-ID')}</div>
        <div class="kpi-sub">Avg ${avgPax} pax / event</div>
      </div>
      <div class="kpi-card amber">
        <div class="kpi-lbl">Avg Revenue / Event</div>
        <div class="kpi-val sm">${fmtRp(avgRev)}</div>
        <div class="kpi-sub">Per booking aktif</div>
      </div>
      <div class="kpi-card purple">
        <div class="kpi-lbl">On-Hand (Belum Done)</div>
        <div class="kpi-val">${confirm + tentative}</div>
        <div class="kpi-sub">${confirm} Confirm · ${tentative} Tentative</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-lbl">Cancel</div>
        <div class="kpi-val">${cancel}</div>
        <div class="kpi-sub">${count + cancel > 0 ? Math.round(cancel/(count+cancel)*100) : 0}% cancellation rate</div>
      </div>
    </div>
    ${renderActVsBudCards(revenue, budgetRev, _selMonth)}`;
  return sec;
}

// ── ACTUAL VS BUDGET GAP CARDS ─────────────────────────────────
function renderActVsBudCards(revenue, budgetRev, selMonth) {
  if (!budgetRev || budgetRev === 0) return '';

  // ── Hitung Achievement ──
  const achPct   = budgetRev > 0 ? parseFloat((revenue / budgetRev * 100).toFixed(2)) : 0;
  const gap      = revenue - budgetRev;   // negatif = kurang
  const gapAbs   = Math.abs(gap);
  const gapPct   = parseFloat((Math.abs(gap) / budgetRev * 100).toFixed(2));
  const isOver   = gap >= 0;

  // ── Sisa hari bulan ini (otomatis hari ini) ──
  const now      = new Date();
  const yr       = now.getFullYear();
  const mo       = now.getMonth();   // 0-based
  const today    = now.getDate();
  const daysInMo = new Date(yr, mo + 1, 0).getDate();
  const remain   = Math.max(daysInMo - today, 0);

  // Hanya tampilkan needed/day jika filter bulan = bulan aktif atau ALL
  const MONTH_IDX = {
    'JANUARI':0,'FEBRUARI':1,'MARET':2,'APRIL':3,'MEI':4,'JUNI':5,
    'JULI':6,'AGUSTUS':7,'SEPTEMBER':8,'OKTOBER':9,'NOVEMBER':10,'DESEMBER':11
  };
  const isCurMonth = selMonth === 'ALL' ||
    (MONTH_IDX[selMonth] !== undefined && MONTH_IDX[selMonth] === mo);
  const neededDay = (!isOver && remain > 0 && isCurMonth) ? gapAbs / remain : 0;

  // ── Warna & label ──
  const achColor  = isOver ? 'green' : achPct >= 70 ? 'amber' : 'red';
  const gapColor  = isOver ? 'green' : 'red';
  const cardColor = isOver ? 'green' : achPct >= 70 ? 'amber' : 'red';

  // ── Card 1: Actual vs Budget ──
  const card1 = `
    <div class="actvbud-card ${cardColor}">
      <div class="actvbud-lbl">📊 Actual vs Budget</div>
      <div class="actvbud-pct ${achColor}">${achPct.toFixed(2)}%</div>
      <div class="actvbud-row">
        <span>Actual</span>
        <strong>${fmtRpFull(revenue)}</strong>
      </div>
      <div class="actvbud-row">
        <span>Budget</span>
        <strong>${fmtRpFull(budgetRev)}</strong>
      </div>
      <span class="actvbud-badge ${achColor}">
        ${isOver ? '▲ Melampaui target' : achPct >= 70 ? '▼ Mendekati target' : '▼ Di bawah target'}
      </span>
      <div class="actvbud-bar-wrap">
        <div class="actvbud-bar-track">
          <div class="actvbud-bar-fill" style="width:${Math.min(achPct,100)}%;background:${isOver?'var(--green)':achPct>=70?'var(--amber)':'var(--red)'}"></div>
        </div>
      </div>
    </div>`;

  // ── Card 2: Variance / GAP ──
  const card2 = `
    <div class="actvbud-card ${gapColor}">
      <div class="actvbud-lbl">📉 Variance / GAP</div>
      <div class="actvbud-pct ${gapColor}">${isOver ? '+' : '−'} ${fmtRp(gapAbs)}</div>
      <div class="actvbud-row">
        <span>GAP Rp</span>
        <strong class="${gapColor}">${isOver ? '+' : '−'}${fmtRpFull(gapAbs)}</strong>
      </div>
      <div class="actvbud-row">
        <span>GAP %</span>
        <strong class="${gapColor}">${isOver ? '+' : '−'}${gapPct.toFixed(2)}% dari budget</strong>
      </div>
      <span class="actvbud-badge ${gapColor}">
        ${isOver ? '✓ Surplus budget' : '✗ Belum tercapai'}
      </span>
    </div>`;

  // ── Card 3: Kebutuhan/Hari ──
  let card3 = '';
  if (isOver) {
    card3 = `
    <div class="actvbud-card green">
      <div class="actvbud-lbl">📅 Kebutuhan Revenue/Hari</div>
      <div class="actvbud-pct green">—</div>
      <div class="actvbud-row"><span>Status</span><strong>Budget sudah tercapai</strong></div>
      <div class="actvbud-row"><span>Surplus</span><strong class="green">${fmtRpFull(gapAbs)}</strong></div>
      <span class="actvbud-badge green">✓ Target selesai</span>
    </div>`;
  } else if (!isCurMonth) {
    card3 = `
    <div class="actvbud-card amber">
      <div class="actvbud-lbl">📅 Kebutuhan Revenue/Hari</div>
      <div class="actvbud-pct amber">—</div>
      <div class="actvbud-row"><span>Info</span><strong>Pilih bulan berjalan</strong></div>
      <div class="actvbud-row"><span>Total kurang</span><strong class="red">${fmtRpFull(gapAbs)}</strong></div>
      <span class="actvbud-badge amber">Bulan tidak aktif</span>
    </div>`;
  } else if (remain === 0) {
    card3 = `
    <div class="actvbud-card amber">
      <div class="actvbud-lbl">📅 Kebutuhan Revenue/Hari</div>
      <div class="actvbud-pct red">${fmtRp(gapAbs)}</div>
      <div class="actvbud-row"><span>Status</span><strong>Bulan sudah berakhir</strong></div>
      <div class="actvbud-row"><span>GAP Final</span><strong class="red">${fmtRpFull(gapAbs)}</strong></div>
      <span class="actvbud-badge red">Bulan berakhir</span>
    </div>`;
  } else {
    card3 = `
    <div class="actvbud-card red">
      <div class="actvbud-lbl">📅 Kebutuhan Revenue/Hari</div>
      <div class="actvbud-pct red">${fmtRp(neededDay)}</div>
      <div class="actvbud-row"><span>Per hari</span><strong class="red">${remain} hari tersisa</strong></div>
      <div class="actvbud-row"><span>Total kurang</span><strong class="red">${fmtRpFull(gapAbs)}</strong></div>
      <span class="actvbud-badge red">Target harian tambahan</span>
    </div>`;
  }

  return `<div class="actvbud-grid fade-up">${card1}${card2}${card3}</div>`;
}

function renderDonutSVG(events) {
  const counts = { CONFIRM:0, TENTATIVE:0, DONE:0, CANCEL:0 };
  const revs   = { CONFIRM:0, TENTATIVE:0, DONE:0, CANCEL:0 };
  events.forEach(e => {
    const st = e.status;
    if (counts[st] !== undefined) { counts[st]++; revs[st] += e.revenue; }
  });
  const total = Object.values(counts).reduce((a,b)=>a+b,0);
  if (total === 0) return '<div style="text-align:center;padding:30px;color:var(--dim);">Tidak ada data</div>';

  const colors = { CONFIRM:'#6366f1', TENTATIVE:'#f59e0b', DONE:'#10b981', CANCEL:'#ef4444' };
  const labels = { CONFIRM:'Confirm', TENTATIVE:'Tentative', DONE:'Done', CANCEL:'Cancel' };
  const R = 50, cx = 60, cy = 60, stroke = 16;
  const circ = 2 * Math.PI * R;

  let offset = 0;
  const segments = Object.entries(counts).map(([st, cnt]) => {
    const frac = cnt / total;
    const seg = { st, cnt, frac, offset, dash: frac * circ };
    offset += frac * circ;
    return seg;
  }).filter(s => s.cnt > 0);

  const svgSegs = segments.map(s =>
    `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${colors[s.st]}"
      stroke-width="${stroke}" stroke-dasharray="${s.dash} ${circ - s.dash}"
      stroke-dashoffset="${circ - s.offset + circ * 0.25}"
      style="transition:stroke-dasharray .6s ease;"/>`
  ).join('');

  const legend = Object.entries(counts).filter(([,v])=>v>0).map(([st,cnt]) =>
    `<div class="legend-item">
      <div class="legend-dot" style="background:${colors[st]};"></div>
      <div class="legend-name">${labels[st]}</div>
      <div class="legend-val">${cnt}</div>
      <div class="legend-pct">${pct(cnt,total)}%</div>
    </div>`
  ).join('');

  return `<div class="donut-wrap">
    <svg class="donut-svg" width="120" height="120" viewBox="0 0 120 120">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="${stroke}"/>
      ${svgSegs}
      <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="#e8e4dc" font-size="18" font-weight="700" font-family="DM Sans">${total}</text>
      <text x="${cx}" y="${cy+10}" text-anchor="middle" fill="#8a8580" font-size="8" font-family="DM Sans">events</text>
    </svg>
    <div class="donut-legend">${legend}</div>
  </div>`;
}

    return (_reportData?.[m]?.events||[])
      .filter(e=>e.status!=='CANCEL')
      .reduce((s,e)=>s+getRevenue(e.revenue||0),0);

        <div style="display:flex;gap:12px;font-size:9px;color:var(--muted);">
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:var(--gold);border-radius:2px;display:inline-block;"></span>Actual</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.3);border-radius:2px;display:inline-block;"></span>Budget</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:var(--done);border-radius:2px;display:inline-block;"></span>Achieve ≥100%</span>

          : '—'}
      </td>
    </tr>`;
  }).join('');

  return `
    <div class="tbl-wrap" style="margin-top:10px;">
      <table class="detail-tbl">
        <thead><tr>
          <th>Bulan</th><th>Events</th><th>Confirm</th><th>Tentative</th><th>Done</th><th>Cancel</th>
          <th>Pax</th><th>Revenue</th><th>Budget</th><th>Achieve</th>
          <th class="th-gap">Variance GAP</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── SECTION 4: BREAKDOWNS ───────────────────────────────────────
function renderBreakdowns() {
  const events = getFilteredEvents().filter(e => e.status !== 'CANCEL');

  // Per venue
  const venueMap = {};
  events.forEach(e => {
    if (!venueMap[e.venue]) venueMap[e.venue] = { rev:0, cnt:0, pax:0 };
    venueMap[e.venue].rev += getRevenue(e.revenue);
    venueMap[e.venue].cnt++;
    venueMap[e.venue].pax += e.pax;
  });
  // Per package
  const pkgMap = {};
  events.forEach(e => {
    const k = e.package || 'OTHER';
    if (!pkgMap[k]) pkgMap[k] = { rev:0, cnt:0 };
    pkgMap[k].rev += getRevenue(e.revenue); pkgMap[k].cnt++;
  });

  const maxVenueRev = Math.max(...Object.values(venueMap).map(v=>v.rev), 1);
  const maxPkgRev   = Math.max(...Object.values(pkgMap).map(v=>v.rev), 1);

  const VENUE_COLORS = ['#c9a84c','#6366f1','#10b981','#f59e0b','#5dade2'];
  const PKG_COLORS   = ['#10b981','#6366f1','#f59e0b','#c9a84c','#9b59b6','#5dade2','#e74c3c','#f39c12','#2ecc71','#e74c3c'];

  const venueBars = Object.entries(venueMap)
    .sort((a,b)=>b[1].rev-a[1].rev)
    .map(([name,d],i) => `
      <div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <span style="font-size:11px;font-weight:600;">${esc(name)}</span>
          <span style="font-size:10px;color:var(--muted)">${d.cnt} events · ${fmtRp(d.rev)}</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct(d.rev,maxVenueRev)}%;background:${VENUE_COLORS[i%VENUE_COLORS.length]};"></div>
        </div>
      </div>`).join('');

  const pkgBars = Object.entries(pkgMap)
    .sort((a,b)=>b[1].rev-a[1].rev)
    .map(([name,d],i) => `
      <div style="margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
          <span style="font-size:10px;font-weight:600;">${esc(name)}</span>
          <span style="font-size:10px;color:var(--muted)">${d.cnt}× · ${fmtRp(d.rev)}</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct(d.rev,maxPkgRev)}%;background:${PKG_COLORS[i%PKG_COLORS.length]};"></div>
        </div>
      </div>`).join('');

  const sec = document.createElement('div');
  sec.innerHTML = `
    <div class="section-hdr" style="margin-top:28px;">
      <div class="section-title">◆ Breakdown</div>
      <div class="section-sub">Venue · Package</div>
    </div>
    <div class="chart-row fade-up">
      <div class="chart-card">
        <div class="chart-title">Revenue per Venue</div>
        ${venueBars || '<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px;">Tidak ada data</div>'}
      </div>
      <div class="chart-card">
        <div class="chart-title">Revenue per Package</div>
        ${pkgBars || '<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px;">Tidak ada data</div>'}
      </div>
    </div>`;
  return sec;
}

// ── SECTION 5: SALES LEADERBOARD ────────────────────────────────
function renderSalesLeaderboard() {
  const events = getFilteredEvents().filter(e => e.status !== 'CANCEL');
  const salesMap = {};
  events.forEach(e => {
    const s = e.sales || 'Unknown';
    if (!salesMap[s]) salesMap[s] = { rev:0, cnt:0, pax:0, done:0 };
    salesMap[s].rev += getRevenue(e.revenue); salesMap[s].cnt++;
    salesMap[s].pax += e.pax;
    if (e.status === 'DONE') salesMap[s].done++;
  });
  const sorted = Object.entries(salesMap).sort((a,b)=>b[1].rev-a[1].rev);
  const maxRev = sorted[0]?.[1]?.rev || 1;

  // ── Total budget periode terpilih ──
  let totalBudget = 0;
  if (_selMonth === 'ALL') {
    MONTHS.forEach(m => { totalBudget += getBudgetDisplay(getBudgetFor(m).targetRevenue); });
  } else {
    totalBudget = getBudgetDisplay(getBudgetFor(_selMonth).targetRevenue);
  }

  // ── Label judul sesuai filter ──
  const monthLabel = _selMonth === 'ALL'
    ? 'Semua Bulan'
    : _selMonth.charAt(0) + _selMonth.slice(1).toLowerCase() + ' 2026';

  const rows = sorted.map(([name, d], i) => {
    const splitKey  = name.toUpperCase();
    const split     = SALES_BUDGET_SPLIT[splitKey];
    const hasBudget = split !== undefined && totalBudget > 0;
    const budgetSales = hasBudget ? totalBudget * split : 0;
    const achieve   = hasBudget ? (d.rev / budgetSales * 100) : 0;
    const achColor  = achieve >= 100 ? 'var(--green)' : achieve >= 70 ? 'var(--amber)' : 'var(--red)';
    const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
    const rankIcon  = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'';

    if (hasBudget) {
      const barW = Math.min(achieve, 100).toFixed(1);
      return `
        <div class="lb-row lb-row-budget">
          <!-- nama + badge target -->
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
            <div class="lb-rank ${rankClass}">${rankIcon}</div>
            <div class="lb-name" style="font-size:13px;flex:1;">${esc(name)}</div>
            <div style="font-size:9px;color:var(--dim);background:rgba(255,255,255,.05);
              border:1px solid var(--border);border-radius:20px;padding:3px 10px;
              letter-spacing:.06em;white-space:nowrap;">
              Target ${Math.round(split*100)}% Budget
            </div>
          </div>
          <!-- 3 mini card: Actual / Budget / Achieve -->
          <div class="lb-achieve-grid">
            <div class="lb-mini-card">
              <div class="lb-mini-lbl">Actual</div>
              <div class="lb-mini-val" style="color:var(--gold)">${fmtRp(d.rev)}</div>
            </div>
            <div class="lb-mini-card">
              <div class="lb-mini-lbl">Budget</div>
              <div class="lb-mini-val" style="color:var(--muted)">${fmtRp(budgetSales)}</div>
            </div>
            <div class="lb-mini-card">
              <div class="lb-mini-lbl">Achieve</div>
              <div class="lb-mini-val" style="color:${achColor}">${achieve.toFixed(2)}%</div>
            </div>
          </div>
          <!-- progress bar achieve -->
          <div style="margin-bottom:10px;">
            <div style="height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;">
              <div style="height:100%;width:${barW}%;background:${achColor};border-radius:3px;transition:width .6s ease;"></div>
            </div>
          </div>
          <!-- Events & Pax -->
          <div style="display:flex;gap:20px;">
            <div class="lb-stat"><div class="lb-stat-val">${d.cnt}</div><div class="lb-stat-lbl">Events</div></div>
            <div class="lb-stat"><div class="lb-stat-val">${d.pax.toLocaleString('id-ID')}</div><div class="lb-stat-lbl">Pax</div></div>
          </div>
        </div>`;
    } else {
      // Sales tanpa mapping budget → tampilan sederhana (original)
      return `
        <div class="lb-row">
          <div class="lb-rank ${rankClass}">${rankIcon}</div>
          <div class="lb-name">${esc(name)}</div>
          <div class="lb-bar-wrap">
            <div class="lb-bar-track"><div class="lb-bar-fill" style="width:${pct(d.rev,maxRev)}%"></div></div>
          </div>
          <div class="lb-stats">
            <div class="lb-stat"><div class="lb-stat-val">${d.cnt}</div><div class="lb-stat-lbl">Events</div></div>
            <div class="lb-stat"><div class="lb-stat-val" style="color:var(--gold)">${fmtRp(d.rev)}</div><div class="lb-stat-lbl">Revenue</div></div>
            <div class="lb-stat"><div class="lb-stat-val">${d.pax.toLocaleString('id-ID')}</div><div class="lb-stat-lbl">Pax</div></div>
          </div>
        </div>`;
    }
  }).join('');

  const sec = document.createElement('div');
  sec.innerHTML = `
    <div class="section-hdr" style="margin-top:28px;">
      <div class="section-title">◆ Sales Leaderboard</div>
      <div class="section-sub">${monthLabel}</div>
    </div>
    <div class="chart-card fade-up">
      <div class="leaderboard">${rows || '<div style="color:var(--dim);text-align:center;padding:20px;">Tidak ada data</div>'}</div>
    </div>`;
  return sec;
}

function filterDetailTable() {
  const q      = (document.getElementById('tbl-search')?.value || '').toLowerCase();
  const stFil  = document.getElementById('tbl-status-filter')?.value || '';
  const vnFil  = document.getElementById('tbl-venue-filter')?.value  || '';
  const tbody  = document.getElementById('detail-tbody');
  if (!tbody) return;

  const events = getFilteredEvents(); // sudah terfilter ONHAND jika aktif
  const filtered = events.filter(e => {
    const txt = [e.customer,e.venue,e.package,e.sales,e.eventType].join(' ').toLowerCase();
    // Jika ONHAND aktif, abaikan status filter (sudah dihandle di getFilteredEvents)
    const statusMatch = _onhandMode ? true : (!stFil || e.status === stFil);
    return (!q || txt.includes(q)) &&
           statusMatch &&
           (!vnFil || e.venue.toUpperCase().includes(vnFil.toUpperCase()));
  });

  const activeFiltered = filtered.filter(e => e.status !== 'CANCEL');
  const grandPax = activeFiltered.reduce((s,e) => s + (e.pax||0), 0);
  const grandRev = activeFiltered.reduce((s,e) => s + getRevenue(e.revenue||0), 0);
  document.getElementById('tbl-count').textContent =
    `${filtered.length} data · ${grandPax.toLocaleString('id-ID')} pax · ${fmtRp(grandRev)}`;

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="11" class="tbl-empty">Tidak ada data sesuai filter</td></tr>`;
    return;
  }

  // Data rows — simpan event obj ke cache global, row pakai index
  if (!window._bkRowCache) window._bkRowCache = {};
  window._bkRowCache = {}; // reset tiap render

  let html = filtered.map((e, idx) => {
    const revDisplay   = e.revenue > 0 ? getRevenue(e.revenue) : 0;
    const priceDisplay = e.price   > 0 ? getRevenue(e.price)   : 0;
    // Simpan ke cache — aman dari karakter spesial
    window._bkRowCache[idx] = {
      day: e.day, bulan: e.bulan, venue: e.venue, customer: e.customer,
      status: e.status, package: e.package, eventType: e.eventType,
      sales: e.sales, time: e.time, pax: e.pax, price: e.price, revenue: e.revenue
    };
    return `<tr class="clickable-row" onclick="openBkModal(window._bkRowCache[${idx}])">
      <td style="color:var(--dim);font-size:10px;">${e.bulan||'—'}</td>
      <td style="color:var(--muted)">${e.day||'—'}</td>
      <td style="font-weight:600;">${esc(e.customer)}</td>
      <td style="color:var(--muted)">${esc(e.venue)}</td>
      <td>${esc(e.package)}</td>
      <td><span class="badge ${e.status}">${e.status}</span></td>
      <td class="tbl-pax">${e.pax||'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:10px;">${priceDisplay > 0 ? fmtRpFull(priceDisplay) : '—'}</td>
      <td class="tbl-revenue">${revDisplay > 0 ? fmtRp(revDisplay) : '—'}</td>
      <td style="color:var(--muted)">${esc(e.sales)}</td>
      <td style="color:var(--dim);font-size:10px;">${esc(e.time)}</td>
    </tr>`;
  }).join('');

  // GRAND TOTAL row
  html += `<tr style="background:rgba(201,168,76,.12);border-top:2px solid rgba(201,168,76,.4);">
    <td colspan="2" style="font-weight:800;color:var(--gold);font-size:11px;letter-spacing:.05em;padding:8px 12px;">TOTAL</td>
    <td colspan="4" style="font-size:10px;color:var(--dim);">${filtered.length} event · ${activeFiltered.length} aktif</td>
    <td style="font-weight:800;color:var(--gold);font-size:12px;">${grandPax.toLocaleString('id-ID')}</td>
    <td></td>
    <td style="font-weight:800;color:var(--gold);font-size:12px;font-family:'DM Mono',monospace;">${fmtRp(grandRev)}</td>
    <td colspan="2"></td>
  </tr>`;

  tbody.innerHTML = html;
}


// ── SECTION: PACKAGE & TYPE OF EVENT DONUT ──────────────────
let _pkgChartInst = null;
let _evtChartInst = null;

function renderPackageEventCharts() {
  const events = getFilteredEvents().filter(e => e.status !== 'CANCEL');

  // Count per package
  const pkgMap = {};
  events.forEach(e => {
    const k = (e.package || 'OTHER').trim().toUpperCase() || 'OTHER';
    pkgMap[k] = (pkgMap[k] || 0) + 1;
  });
  // Count per eventType
  const evtMap = {};
  events.forEach(e => {
    const raw = (e.eventType && e.eventType.trim()) ? e.eventType.trim() : (e.package || 'OTHER');
    const k = raw.toUpperCase() || 'OTHER';
    evtMap[k] = (evtMap[k] || 0) + 1;
  });

  const PALETTE = [
    '#c9a84c','#6366f1','#10b981','#f59e0b','#5dade2',
    '#9b59b6','#e74c3c','#f39c12','#2ecc71','#3498db','#e67e22','#1abc9c'
  ];

  function buildDonutData(map) {
    const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);
    return {
      labels: entries.map(e=>e[0]),
      data:   entries.map(e=>e[1]),
      colors: entries.map((_,i)=>PALETTE[i%PALETTE.length])
    };
  }

  const pkgD = buildDonutData(pkgMap);
  const evtD = buildDonutData(evtMap);
  const total = events.length;

  const sec = document.createElement('div');
  sec.innerHTML = `
    <div class="section-hdr" style="margin-top:28px;">
      <div class="section-title">◆ Package & Type of Event</div>
      <div class="section-sub">Distribusi ${total} Event Aktif</div>
    </div>
    <div class="chart-row fade-up">
      <div class="chart-card">
        <div class="chart-title">Package Distribution</div>
        <div class="canvas-wrap" style="height:200px;">
          <canvas id="chart-pkg"></canvas>
        </div>
        <div id="legend-pkg" style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Type of Event Distribution</div>
        <div class="canvas-wrap" style="height:200px;">
          <canvas id="chart-evt"></canvas>
        </div>
        <div id="legend-evt" style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;"></div>
      </div>
    </div>`;

  // Render charts after DOM insert
  setTimeout(() => {
    if (_pkgChartInst) { _pkgChartInst.destroy(); _pkgChartInst = null; }
    if (_evtChartInst) { _evtChartInst.destroy(); _evtChartInst = null; }

    function makeDonut(canvasId, d, legendId) {
      const ctx = document.getElementById(canvasId);
      if (!ctx || !d.data.length) return;
      const inst = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: d.labels,
          datasets: [{ data: d.data, backgroundColor: d.colors, borderWidth: 0, hoverOffset: 4 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          cutout: '68%',
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const pct = Math.round(ctx.parsed / total * 100);
                  return ` ${ctx.label}: ${ctx.parsed} event (${pct}%)`;
                }
              },
              backgroundColor: '#1e1e24', titleColor: '#c9a84c',
              bodyColor: '#e8e4dc', borderColor: 'rgba(255,255,255,.1)', borderWidth: 1
            }
          }
        }
      });

      // Custom legend
      const leg = document.getElementById(legendId);
      if (leg) {
        leg.innerHTML = d.labels.map((lbl,i) => {
          const pct = Math.round(d.data[i]/total*100);
          return `<div style="display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.04);border-radius:6px;padding:3px 8px;">
            <span style="width:8px;height:8px;border-radius:2px;background:${d.colors[i]};flex-shrink:0;display:inline-block;"></span>
            <span style="font-size:9px;color:var(--muted);">${esc(lbl)}</span>
            <span style="font-size:9px;font-weight:700;color:var(--text);">${d.data[i]}</span>
            <span style="font-size:8px;color:var(--dim);">${pct}%</span>
          </div>`;
        }).join('');
      }
      return inst;
    }

    _pkgChartInst = makeDonut('chart-pkg', pkgD, 'legend-pkg');
    _evtChartInst = makeDonut('chart-evt', evtD, 'legend-evt');
  }, 50);

  return sec;
}

function renderHeatmap(occData, venues) {
  const maxEvents = Math.max(...venues.flatMap(v =>
    MONTHS.map(m => occData[v][m].booked)
  ), 1);

  const headers = `<div class="hm-cell" style="background:transparent;border:none;"></div>` +
    MONTH_SHORT.map(m => `<div class="hm-header">${m}</div>`).join('');

  const rows = venues.map(v =>
    `<div class="hm-venue-lbl">${esc(v)}</div>` +
    MONTHS.map(m => {
      const n = occData[v][m].booked;
      const lv = n === 0 ? 0 : n <= maxEvents*.2 ? 1 : n <= maxEvents*.4 ? 2 : n <= maxEvents*.6 ? 3 : n <= maxEvents*.8 ? 4 : 5;
      return `<div class="hm-cell lv${lv}" title="${v} ${m}: ${n} event">${n > 0 ? n : ''}</div>`;
    }).join('')
  ).join('');

  return `<div class="heatmap-wrap">
    <div class="heatmap-grid" style="grid-template-columns:130px repeat(12,1fr);gap:6px;">
      ${headers}${rows}
    </div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:8px;font-size:9px;color:var(--dim);">
      Density: ${[0,1,2,3,4,5].map(lv=>
        `<span class="hm-cell lv${lv}" style="width:14px;height:14px;aspect-ratio:auto;display:inline-block;border-radius:3px;flex-shrink:0;"></span>`
      ).join('')} <span style="margin-left:4px;">Rendah → Tinggi</span>
    </div>
  </div>`;
}

async function saveBudget() {
  const st = document.getElementById('budget-status');
  st.textContent = '⏳ Menyimpan...'; st.style.color = 'var(--muted)';
  try {
    const rows = MONTHS.map(m => ({
      bulan:         m,
      targetRevenue: parseFloat(document.getElementById(`bud-rev-${m}`)?.value) || 0,
      targetEvents:  parseInt(document.getElementById(`bud-evt-${m}`)?.value)   || 0,
      targetPax:     0,
      notes:         ''
    }));
    _idToken = await _auth.currentUser.getIdToken(true);
    const res = await gas({ action:'SAVE_BUDGET', budgetJson: JSON.stringify(rows) });
    if (res.ok) {
      st.style.color = 'var(--done)';
      st.textContent = '✦ Budget disimpan. Klik Refresh untuk update chart.';
      _budgetData = rows;
    } else {
      st.style.color = 'var(--red)';
      st.textContent = '✗ ' + (res.msg || 'Gagal.');
    }
  } catch(e) {
    st.style.color = 'var(--red)';
    st.textContent = '✗ ' + e.message;
  }
}

// COPY TEXT — salin data tabel ke clipboard sebagai TSV
// ══════════════════════════════════════════════════════════════════
function copyTableText() {
  const tbl = document.getElementById('detail-tbl');
  if (!tbl) return;
  const rows = [];
  // Header
  const headers = Array.from(tbl.querySelectorAll('thead th')).map(th => th.textContent.trim());
  rows.push(headers.join('	'));
  // Body
  tbl.querySelectorAll('tbody tr').forEach(tr => {
    const cells = Array.from(tr.querySelectorAll('td')).map(td => td.textContent.trim());
    rows.push(cells.join('	'));
  });
  const text = rows.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    _showToast('📋 Data disalin ke clipboard! (' + (rows.length-1) + ' baris)');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    _showToast('📋 Data disalin ke clipboard!');
  });
}

function _showToast(msg) {
  let toast = document.getElementById('rpt-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'rpt-toast';
    toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);' +
      'background:var(--card);border:1px solid var(--border2);color:var(--text);' +
      'padding:10px 20px;border-radius:10px;font-size:12px;font-weight:600;' +
      'z-index:9999;transition:opacity .3s;pointer-events:none;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._to);
  toast._to = setTimeout(() => { toast.style.opacity = '0'; }, 2500);
}

// EXPORT EXCEL — export tabel detail ke .xlsx
// ══════════════════════════════════════════════════════════════════
function exportTableExcel() {
  if (typeof XLSX === 'undefined') {
    _showToast('⚠ SheetJS belum termuat. Coba refresh halaman.'); return;
  }
  const events = getFilteredEvents().filter(e => e.status !== 'CANCEL');
  if (!events.length) { _showToast('⚠ Tidak ada data.'); return; }

  const modeLabel = _revenueMode === 'nett' ? 'Nett' : 'Gross';
  const headers = ['Bulan','Tgl','Customer','Venue','Package','Type of Event',
                   'Status','Pax','Harga/Pax','Revenue '+modeLabel,'Sales','Waktu'];

  // Semua angka sebagai NUMBER agar bisa formula di Excel
  const dataRows = events.map(e => [
    e.bulan || '', e.day || '', e.customer, e.venue,
    e.package, e.eventType || e.package, e.status,
    e.pax || 0,
    e.price > 0 ? Math.round(getRevenue(e.price)) : 0,        // Harga/Pax Nett/Gross
    e.revenue > 0 ? Math.round(getRevenue(e.revenue)) : 0,    // Revenue Nett/Gross
    e.sales, e.time
  ]);

  // Total row
  const totalPax = dataRows.reduce((s,r)=>s+r[7],0);
  const totalRev = dataRows.reduce((s,r)=>s+r[9],0);
  const totalRow = ['TOTAL','','','','','',
    dataRows.length+' event', totalPax, '', totalRev, '', ''];

  const wsData = [headers, ...dataRows, totalRow];
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws['!cols'] = [
    {wch:12},{wch:5},{wch:30},{wch:16},{wch:14},{wch:18},
    {wch:12},{wch:8},{wch:16},{wch:18},{wch:8},{wch:12}
  ];

  // Format number columns sebagai number (angka murni, bisa SUM)
  const lastDataRow = dataRows.length + 1; // +1 untuk header
  for (let ri = 1; ri <= lastDataRow; ri++) {
    [7, 8, 9].forEach(ci => {
      const ref = XLSX.utils.encode_cell({r:ri, c:ci});
      const cell = ws[ref];
      if (cell && typeof cell.v === 'number') {
        cell.t = 'n'; // pastikan tipe number
        cell.z = '#,##0'; // format ribuan tanpa desimal
      }
    });
  }

  // Style header
  headers.forEach((_, ci) => {
    const cell = ws[XLSX.utils.encode_cell({r:0, c:ci})];
    if (cell) cell.s = {
      font: { bold:true, color:{ rgb:'C9A84C' } },
      fill: { fgColor:{ rgb:'1A1428' } },
      alignment: { horizontal:'center' }
    };
  });

  // Style total row
  const totalRowIdx = dataRows.length + 1;
  [0,7,9].forEach(ci => {
    const ref = XLSX.utils.encode_cell({r:totalRowIdx, c:ci});
    const cell = ws[ref];
    if (cell) cell.s = { font: { bold:true }, fill: { fgColor:{ rgb:'FFF3CD' } } };
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Detail Booking');
  _addSummarySheet(wb);

  const month = _selMonth === 'ALL' ? 'Semua_Bulan' : _selMonth;
  const date  = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `Lotus_Garden_${modeLabel}_${month}_${date}.xlsx`);
  _showToast(`📊 Excel ${modeLabel} berhasil diunduh!`);
}


function _addSummarySheet(wb) {
  if (!_reportData) return;
  const headers = ['Bulan','Events','Confirm','Tentative','Done','Cancel',
                   'Total Pax','Revenue Actual','Budget Target','Achievement %'];
  const rows = MONTHS.map((m, i) => {
    const d = _reportData[m];
    const b = getBudgetFor(m);
    const rev = d ? (d.events||[]).filter(e=>e.status!=='CANCEL').reduce((s,e)=>s+getRevenue(e.revenue),0) : 0;
    const budDisplay = getBudgetDisplay(b.targetRevenue);
    const ach = budDisplay > 0 ? Math.round(rev/budDisplay*100) : 0;
    return [
      m, d ? d.count : 0,
      d ? d.countConfirm : 0, d ? d.countTentative : 0,
      d ? d.countDone : 0, d ? d.countCancel : 0,
      d ? d.pax : 0, rev, budDisplay,
      budDisplay > 0 ? (ach + '%') : '—'
    ];
  });

  // Add total row
  const totRev = MONTHS.reduce((s,m) => s + (_reportData[m]?.events||[]).filter(e=>e.status!=='CANCEL').reduce((ss,e)=>ss+getRevenue(e.revenue),0), 0);
  const totBud = MONTHS.reduce((s,m) => s + getBudgetDisplay(getBudgetFor(m).targetRevenue), 0);
  rows.push(['TOTAL',
    MONTHS.reduce((s,m) => s + (_reportData[m]?.count||0), 0),
    MONTHS.reduce((s,m) => s + (_reportData[m]?.countConfirm||0), 0),
    MONTHS.reduce((s,m) => s + (_reportData[m]?.countTentative||0), 0),
    MONTHS.reduce((s,m) => s + (_reportData[m]?.countDone||0), 0),
    MONTHS.reduce((s,m) => s + (_reportData[m]?.countCancel||0), 0),
    MONTHS.reduce((s,m) => s + (_reportData[m]?.pax||0), 0),
    totRev, totBud,
    totBud > 0 ? Math.round(totRev/totBud*100) + '%' : '—'
  ]);

  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws['!cols'] = [{wch:14},{wch:8},{wch:10},{wch:12},{wch:8},{wch:8},
                 {wch:10},{wch:16},{wch:16},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws, 'Summary Bulanan');
}

// EXPORT BANQUET JSON — untuk Estimasi Revenue

function exportBanquetJSON(){
  if(!_reportData){
    showExportModal(null, 'Data belum dimuat. Silakan login dan tunggu data selesai dimuat.');
    return;
  }

  // Ikuti filter bulan yang aktif di topbar
  const selMonth = document.getElementById('sel-month')?.value || 'ALL';
  const isFiltered = selMonth && selMonth !== 'ALL';
  const filterLabel = isFiltered ? selMonth : 'SEMUA BULAN';

  const monthMap={
    'JANUARI':'JAN','FEBRUARI':'FEB','MARET':'MAR','APRIL':'APR',
    'MEI':'MEI','JUNI':'JUN','JULI':'JUL','AGUSTUS':'AUG',
    'SEPTEMBER':'SEP','OKTOBER':'OKT','NOVEMBER':'NOV','DESEMBER':'DES'
  };

  const out={};

  // Iterasi: jika filter aktif, hanya proses bulan tersebut
  Object.entries(_reportData).forEach(([mName, mData])=>{
    // Skip bulan lain jika ada filter
    if(isFiltered && mName !== selMonth) return;

    const key = monthMap[mName]||mName;
    const events = (mData.events||[])
      .filter(ev=>ev.status==='CONFIRM'||ev.status==='TENTATIVE')
      .map(ev=>{
        const grossRev = (ev.pax||0)*(ev.price||0);
        const revenue  = getRevenue(grossRev); // ikut toggle Nett/Gross
        return {
          status:   ev.status,
          date:     ev.date||'',
          venue:    ev.venue||'',
          customer: ev.customer||'',
          pax:      ev.pax||0,
          price:    ev.price||0,
          revenue,  // sudah di-convert sesuai mode
          package:  ev.package||'',
          sales:    ev.sales||''
        };
      });
    out[mName]={
      events,
      total_confirm:   events.filter(e=>e.status==='CONFIRM').reduce((s,e)=>s+e.revenue,0),
      total_tentative: events.filter(e=>e.status==='TENTATIVE').reduce((s,e)=>s+e.revenue,0),
      total:           events.reduce((s,e)=>s+e.revenue,0),
      count:           events.length,
      mode:            _revenueMode  // catat mode saat export
    };
  });

  const json = JSON.stringify(out);

  // Summary
  const totalConfirm   = Object.values(out).reduce((s,m)=>s+m.total_confirm,0);
  const totalTentative = Object.values(out).reduce((s,m)=>s+m.total_tentative,0);
  const totalAll       = totalConfirm + totalTentative;
  const totalEvents    = Object.values(out).reduce((s,m)=>s+m.count,0);
  const bulanCount     = Object.keys(out).length;

  showExportModal(json, null, {
    totalConfirm, totalTentative, totalAll, totalEvents,
    filterLabel, isFiltered, bulanCount,
    mode: _revenueMode  // 'nett' atau 'gross'
  });
}

    <div style="background:var(--card);border:1px solid rgba(20,184,166,.3);border-radius:18px;

            📋 Export Banquet Onhand
          </div>
          <div style="font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-top:3px">
            ${summary.isFiltered

          <div style="font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">CONFIRM</div>
          <div style="font-family:'DM Mono',monospace;font-size:16px;font-weight:800;color:#22f0a0">${fmtRp(summary.totalConfirm)}</div>

function doCopyBanquetJSON(){
  const modal = document.getElementById('bnq-export-modal');
  if(!modal||!modal._json) return;
  const status = document.getElementById('bnq-copy-status');
  const btn = document.getElementById('bnq-copy-btn');

  // Method 1: Clipboard API
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(modal._json).then(()=>{
      status.textContent = '✓ JSON berhasil di-copy! Buka hotel_revenue.html dan paste.';
      btn.textContent = '✓ Copied!';
      btn.style.background = 'rgba(16,185,129,.2)';
      btn.style.borderColor = 'rgba(16,185,129,.4)';
      btn.style.color = '#22f0a0';
      setTimeout(()=>{
        btn.textContent = '📋 Copy JSON ke Clipboard';
        btn.style.background = 'rgba(20,184,166,.15)';
        btn.style.borderColor = 'rgba(20,184,166,.4)';
        btn.style.color = 'var(--teal)';
      }, 3000);
    }).catch(()=>_copyFallback(modal._json));
  } else {
    _copyFallback(modal._json);
  }
}

function _copyFallback(json){
  // Fallback: select textarea
  const ta = document.getElementById('bnq-json-output');
  if(ta){
    // Replace preview with full JSON
    ta.value = json;
    ta.select();
    ta.setSelectionRange(0,99999);
    document.execCommand('copy');
    const status = document.getElementById('bnq-copy-status');
    status.textContent = '✓ Copied via selection! Buka hotel_revenue.html dan paste.';
  }
}

function downloadBanquetJSON(){
  const modal = document.getElementById('bnq-export-modal');
  if(!modal||!modal._json) return;
  const blob = new Blob([modal._json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'banquet_onhand_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('bnq-copy-status').textContent = '✓ File banquet_onhand.json berhasil didownload!';
}
